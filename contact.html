<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="Images/favicon.svg" type="image/x-icon">
<title>Solar – Clean Energy Solutions</title>
<link rel="stylesheet" href="Css/contact.css">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; } */


</style>
</head>
<body>

<div class="page-wrapper">

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">Cyrus</a>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <button onclick="sendWhatsApp()"  class="btn-free-quote desktop-cta">
      <span class="btn-dot"></span>
      Free Quote
    </button>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="contact-card">

      <!-- LEFT -->
      <div class="card-left">
        <div>
          <h1 class="card-heading">
            REACH OUT FOR<br>
            CLEAN <span class="highlight">Energy</span><br>
            SOLUTIONS
          </h1>
          <p class="card-desc">Seamless installation and smart energy solutions designed for everyday use</p>
        </div>
        <div>
          <div class="contact-info">
            <div class="contact-info-item">
              <i class="fas fa-envelope icon-mail"></i>
              cyrussolarsolutions@gmail.com
            </div>
            <div class="contact-info-item">
              <i class="fas fa-phone icon-phone"></i>
              +91 8086512712
            </div>
          </div>
          <div class="social-links">
            <a href="https://www.instagram.com/cyrus_solar_solutions/" target="_blank" class="social-btn social-ig"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/61553609997885/about/" target="_blank" class="social-btn social-fb"><i class="fab fa-facebook-f"></i></a>
            <!-- <a href="https://www.meta.com/cyrus_solar_solutions" target="_blank" class="social-btn social-tw"><i class="fab fa-twitter"></i></a> -->
          </div>
        </div>
      </div>

      <!-- RIGHT FORM -->
      <form id="contactForm" action="https://formspree.io/f/xjgdvjyd" method="POST" onsubmit="handleSubmit(event)" class="card-right">

        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" placeholder="Enter Name" required>
        </div>

        <div class="form-group">
          <label>Phone no</label>
          <input type="tel" name="phone" placeholder="Enter Your Number" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter Your Email" required>
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea name="address" placeholder="Enter Your Address"></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit</button>

        <div id="successMsg" class="success-msg">
          ✅ Message sent successfully!
        </div>

      </form>

    </div>
  </section>

</div>

<script>
  // Hamburger toggle
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
    document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
  });

  // Close mobile menu on link click
  mobileMenu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
      document.body.style.overflow = '';
    });
  });

  // Form submit
  async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.reset();
        successMsg.style.display = 'block';
        btn.textContent = 'Submit';
        btn.disabled = false;
      } else {
        btn.textContent = 'Try Again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Try Again';
      btn.disabled = false;
    }
  }

  function sendWhatsApp() {
  let message = `Hello,I am interested in your Free Consultation service. Please contact me.`;

  let url = "https://wa.me/918086512712?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
  }
</script>
</body>
</html>
